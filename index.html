<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Compare India</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
text-align:center;
}

header{
background:#2563eb;
padding:20px;
font-size:28px;
font-weight:bold;
}

.search{
margin:30px;
}

input{
width:80%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
}

button{
margin-top:15px;
padding:12px 25px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
width:140px;
border-radius:12px;
font-size:18px;
}
</style>
</head>

<body>

<header>🛒 Price Compare India</header>

<div class="search">
<h2>भारत में सबसे सस्ता प्रोडक्ट खोजें</h2>
<input type="text" placeholder="Product Name">
<br>
<button>Search</button>
</div>

<div class="cards">
<div class="card">🛍 Amazon</div>
<div class="card">🛒 Flipkart</div>
<div class="card">🟣 Meesho</div>
<div class="card">👕 Myntra</div>
</div>

</body>
</html>

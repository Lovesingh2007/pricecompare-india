<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Compare India</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
text-align:center;
}
header{
background:#2563eb;
padding:20px;
font-size:28px;
font-weight:bold;
}
input{
width:80%;
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
margin-top:30px;
}
button{
padding:15px 30px;
margin:20px;
font-size:18px;
background:#22c55e;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
.card{
background:#1f2937;
margin:15px auto;
padding:20px;
width:80%;
border-radius:12px;
}
a{
color:white;
text-decoration:none;
font-size:20px;
display:block;
padding:10px;
}
</style>
</head>

<body>

<header>🛒 Price Compare India</header>

<h2>भारत में सबसे सस्ता प्रोडक्ट खोजें</h2>

<input id="product" placeholder="Product Name">
<br>

<button onclick="searchProduct()">Search</button>

<div id="results"></div>

<script>
function searchProduct(){
let p=document.getElementById("product").value.trim();

if(p==""){
alert("पहले Product Name लिखें");
return;
}

document.getElementById("results").innerHTML=`
<div class="card"><a href="https://www.amazon.in/s?k=${encodeURIComponent(p)}" target="_blank">🛍 Amazon पर देखें</a></div>
<div class="card"><a href="https://www.flipkart.com/search?q=${encodeURIComponent(p)}" target="_blank">🛒 Flipkart पर देखें</a></div>
<div class="card"><a href="https://www.meesho.com/search?q=${encodeURIComponent(p)}" target="_blank">🟣 Meesho पर देखें</a></div>
<div class="card"><a href="https://www.myntra.com/${encodeURIComponent(p)}" target="_blank">👕 Myntra पर देखें</a></div>
`;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Compare India</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

header{
background:#2563eb;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.hero{
padding:40px 20px;
text-align:center;
}

.hero h1{
font-size:35px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#cbd5e1;
margin-bottom:20px;
}

input{
width:90%;
max-width:500px;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
}

button{
margin-top:15px;
padding:15px 35px;
background:#22c55e;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
font-size:20px;
}

footer{
text-align:center;
padding:20px;
color:#94a3b8;
}
</style>

</head>

<body>

<header>
🛒 Price Compare India
</header>

<section class="hero">
<h1>Find the Best Price</h1>
<p>Compare prices from Amazon, Flipkart, Meesho and more.</p>

<input type="text" placeholder="Search Product...">
<br>
<button>Search</button>
</section>

<section class="categories">
<div class="card">📱 Mobiles</div>
<div class="card">💻 Laptops</div>
<div class="card">⌚ Watches</div>
<div class="card">🎧 Earbuds</div>
<div class="card">📺 TVs</div>
<div class="card">🧊 Refrigerators</div>
</section>

<footer>
© 2026 Price Compare India
</footer>

</body>
</html>

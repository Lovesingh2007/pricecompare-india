<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Compare India</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#2563eb;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.hero{
padding:40px 20px;
text-align:center;
}

.hero h1{
font-size:38px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#cbd5e1;
margin-bottom:25px;
}

.search-box{
text-align:center;
}

input{
width:90%;
max-width:500px;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
margin-top:15px;
padding:15px 35px;
background:#22c55e;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>
<body>

<header>
🛒 Price Compare India
</header>

<section class="hero">
<h1>Find the Best Price</h1>
<p>Compare prices from Amazon, Flipkart, Meesho and more.</p>

<div class="search-box">
<input id="product" placeholder="Search Product">
<br>
<button onclick="searchProduct()">Search</button>
</div>
</section>

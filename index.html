<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Compare India</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#2563eb;
padding:20px;
font-size:28px;
font-weight:bold;
}

input{
width:80%;
padding:15px;
margin-top:20px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
margin:20px;
padding:15px 30px;
font-size:18px;
background:#22c55e;
color:white;
border:none;
border-radius:10px;
}

.card{
background:#1e293b;
width:85%;
margin:20px auto;
padding:20px;
border-radius:15px;
}

img{
width:150px;
border-radius:10px;
}

.price{
font-size:24px;
color:#22c55e;
font-weight:bold;
}
</style>

</head>

<body>

<header>🛒 Price Compare India</header>

<h2>भारत में सबसे सस्ता प्रोडक्ट खोजें</h2>

<input placeholder="Product Name">
<br>
<button>Search</button>

<div class="card">
<img src="https://via.placeholder.com/150">
<h2>Sample Product</h2>
<p class="price">₹999</p>
<p>Amazon</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h2>Sample Product</h2>
<p class="price">₹949</p>
<p>Flipkart</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h2>Sample Product</h2>
<p class="price">₹979</p>
<p>Meesho</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h2>Sample Product</h2>
<p class="price">₹1019</p>
<p>Myntra</p>
</div>

</body>
</html>
